# dtx v2 - Simple API Example
# Minimal Node.js API with health check

project:
  name: simple-api
  description: Simple API example

settings:
  log_level: info
  health_check_interval: 5s
  shutdown_timeout: 30s

health:
  interval: 5s
  timeout: 3s
  retries: 3

restart:
  policy: on-failure
  max_retries: 3

resources:
  api:
    kind: process
    command: node server.js
    port: 3000
    environment:
      NODE_ENV: development
      PORT: "3000"
    health:
      http:
        path: /health
        port: 3000
      interval: 5s
      timeout: 3s
    restart: on-failure
