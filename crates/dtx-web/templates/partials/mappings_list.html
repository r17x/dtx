{% for mapping in custom_mappings %}
<div class="flex items-center justify-between bg-dtx-elevated/50 rounded px-3 py-2">
    <div class="flex items-center gap-2 font-mono text-sm">
        <span class="text-gray-300">{{ mapping.0 }}</span>
        <span class="text-gray-500">&rarr;</span>
        <span class="text-status-active">{{ mapping.1 }}</span>
    </div>
    <button hx-delete="/htmx/mappings/{{ mapping.0 }}"
            hx-target="#custom-mappings-list"
            hx-swap="innerHTML"
            class="text-gray-400 hover:text-status-error text-sm">
        &times;
    </button>
</div>
{% endfor %}
{% if custom_mappings.is_empty() %}
<p class="text-gray-500 text-sm text-center py-4">No custom mappings defined</p>
{% endif %}
