<div class="bg-gray-900 rounded-lg overflow-hidden shadow-lg">
    <div class="px-4 py-2 bg-gray-800 flex items-center justify-between">
        <span class="text-sm font-medium text-white">Logs: {{ service }}</span>
        <button 
            onclick="this.closest('.bg-gray-900').remove()"
            class="text-gray-400 hover:text-white transition-colors"
            title="Close logs"
        >
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
    
    <div 
        id="log-container-{{ service }}"
        hx-ext="sse"
        sse-connect="/sse/logs/{{ service }}"
        class="h-64 overflow-y-auto p-4 font-mono text-xs text-gray-300 space-y-1"
        style="scroll-behavior: smooth;"
    >
        <div id="log-content-{{ service }}" sse-swap="log" hx-swap="beforeend scroll:bottom">
            <div class="text-gray-500 italic">Connecting to log stream...</div>
        </div>
        <div id="log-error-{{ service }}" sse-swap="error" hx-swap="innerHTML"></div>
        <div id="log-info-{{ service }}" sse-swap="info" hx-swap="innerHTML"></div>
    </div>
</div>

<script>
    // Handle log entries from SSE
    (function() {
        const serviceName = '{{ service }}';
        const logContainer = document.getElementById('log-content-' + serviceName);
        
        document.addEventListener('htmx:sseMessage', function(evt) {
            const element = evt.detail.elt;
            if (!element || !element.id.includes(serviceName)) return;

            if (evt.detail.type === 'log') {
                try {
                    const data = JSON.parse(evt.detail.data);
                    const logEntry = document.createElement('div');
                    logEntry.className = 'py-0.5 hover:bg-gray-800 transition-colors';
                    
                    const time = new Date(data.timestamp).toLocaleTimeString();
                    logEntry.innerHTML = `
                        <span class="text-gray-500">${time}</span>
                        <span class="text-indigo-400">[${data.service}]</span>
                        <span>${escapeHtml(data.message)}</span>
                    `;
                    
                    logContainer.appendChild(logEntry);
                    
                    // Auto-scroll to bottom
                    const container = document.getElementById('log-container-' + serviceName);
                    if (container) {
                        container.scrollTop = container.scrollHeight;
                    }
                    
                    // Limit log entries to prevent memory issues (keep last 500)
                    while (logContainer.children.length > 500) {
                        logContainer.removeChild(logContainer.firstChild);
                    }
                } catch (e) {
                    console.error('Failed to parse log entry:', e);
                }
            } else if (evt.detail.type === 'error') {
                try {
                    const data = JSON.parse(evt.detail.data);
                    const errorDiv = document.getElementById('log-error-' + serviceName);
                    if (errorDiv) {
                        errorDiv.innerHTML = `<div class="text-red-400 p-2 bg-red-900/20 rounded">${escapeHtml(data.error)}</div>`;
                    }
                } catch (e) {
                    console.error('Failed to parse error:', e);
                }
            } else if (evt.detail.type === 'info') {
                try {
                    const data = JSON.parse(evt.detail.data);
                    const infoDiv = document.getElementById('log-info-' + serviceName);
                    if (infoDiv) {
                        infoDiv.innerHTML = `<div class="text-blue-400 p-2 bg-blue-900/20 rounded">${escapeHtml(data.message)}</div>`;
                    }
                } catch (e) {
                    console.error('Failed to parse info:', e);
                }
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    })();
</script>
